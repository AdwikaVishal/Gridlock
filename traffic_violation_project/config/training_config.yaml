traffic_model:
  pretrained: 'yolov8m.pt'
  data_path: 'data/traffic_dataset.yaml'
  epochs: 100
  img_size: 640
  batch_size: 16
  workers: 8
  patience: 20
  project_dir: 'runs/traffic'
  run_name: 'traffic_violation_v1'

plate_model:
  pretrained: 'yolov8n.pt'
  data_path: 'data/plate_dataset.yaml'
  epochs: 50
  img_size: 416
  batch_size: 32
  workers: 8
  patience: 10
  project_dir: 'runs/plate'
  run_name: 'license_plate_v1'

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0
